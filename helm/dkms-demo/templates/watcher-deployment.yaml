apiVersion: apps/v1
kind: Deployment
metadata:
  name: watcher
  labels:
    {{- include "dkms-demo.labels" . | nindent 4 }}
    app: watcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: watcher
  template:
    metadata:
      labels:
        app: watcher
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      initContainers:
        - name: wait-for-witnesses
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              {{- range .Values.witnesses }}
              until nc -z {{ .name }} {{ .port }}; do echo "waiting for {{ .name }}..."; sleep 2; done
              {{- end }}
      containers:
        - name: watcher
          image: "{{ .Values.image.watcher.repository }}:{{ .Values.image.watcher.tag }}"
          imagePullPolicy: {{ .Values.image.watcher.pullPolicy }}
          ports:
            - containerPort: {{ .Values.watcher.port }}
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /app/watcher.yml
              subPath: watcher.yml
            - name: db
              mountPath: /app/db
      volumes:
        - name: config
          configMap:
            name: watcher-config
        - name: db
          persistentVolumeClaim:
            claimName: watcher-pvc
