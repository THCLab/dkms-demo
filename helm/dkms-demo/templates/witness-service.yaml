{{- range .Values.witnesses }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  labels:
    {{- include "dkms-demo.labels" $ | nindent 4 }}
    app: {{ .name }}
spec:
  type: NodePort
  selector:
    app: {{ .name }}
  ports:
    - port: {{ .port }}
      targetPort: {{ .port }}
      nodePort: {{ .nodePort }}
      protocol: TCP
{{- end }}
