apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: watcher-pvc
  labels:
    {{- include "watcher.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- include "watcher.storageClass" . | nindent 2 }}
