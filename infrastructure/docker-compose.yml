version: "3.9"
services:
  witness: &witness
    image: "ghcr.io/thclab/keriox-witness:latest"
    restart: always
    networks:
      - dkms-network

  witness1:
    container_name: keriox-witness1
    <<: *witness
    ports:
      - "3232:3232"
    volumes:
      - type: bind
        source: ./witness1.yml
        target: /app/witness.yml

  witness2:
    container_name: keriox-witness2
    <<: *witness
    ports:
      - "3233:3232"
    volumes:
      - type: bind
        source: ./witness2.yml
        target: /app/witness.yml

  witness3:
    container_name: keriox-witness3
    <<: *witness
    ports:
      - "3234:3232"
    volumes:
      - type: bind
        source: ./witness3.yml
        target: /app/witness.yml

  watcher:
    container_name: keriox-watcher
    image: "ghcr.io/thclab/keriox-watcher:latest"
    restart: always
    depends_on:
      - witness1
      - witness2
      - witness3
    ports:
      - "3231:3232"
    volumes:
      - type: bind
        source: ./watcher.yml
        target: /app/watcher.yml
    networks:
      - dkms-network

networks:
  dkms-network:
    external: true
